# Model definitions for the evaluation system.
#
# Most models route through OpenRouter. Local models use llama.cpp (llama-server).
# Use only with synthetic test data — never with real patient data.
#
# Each entry defines a model adapter with its provider, model ID, tier,
# and default inference parameters. Token limits are used for prompt
# truncation and cost estimation.
#
# Tiers reflect deployable hardware targets:
#   1 = 16GB VRAM (RTX 4060 Ti / RTX 5060 Ti)
#   2 = 24GB VRAM (RTX 4090)
#   3 = MoE — fast inference on 24GB
#   ceiling = cloud models (ceiling benchmarks, 1 run each)
#
# Local models (provider: llamacpp) have additional optional fields:
#   hf_repo: HuggingFace GGUF repo for auto-download (e.g. "bartowski/Qwen3-8B-GGUF:Q4_K_M")
#   server_params: llama-server flags (gpu_layers, flash_attn, threads, ctx_size)

models:
  # --- Local models (llama.cpp) ---
  - name: "Llama 3.1 8B"
    provider: llamacpp
    model_id: "llama-3.1-8b"
    hf_repo: "bartowski/Meta-Llama-3.1-8B-Instruct-GGUF:Q4_K_M"
    server_params:
      gpu_layers: 99
      flash_attn: true
      threads: 6
      ctx_size: 4096
    tier: 1
    runs: 5
    parameters:
      temperature: 0.0
      max_tokens: 1024
    token_limit: 131072

  - name: "Qwen3 8B Local"
